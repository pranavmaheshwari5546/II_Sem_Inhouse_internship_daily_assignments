<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.min.css">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(res => res.json())
        .then(data => {
            console.log(data);
            let usernames = data.map(user => user.username);
        });
    </script>
</head>

<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Student Records</h1>
        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">
        <div id="container" class="row g-4"></div>
        <div id="json"></div>
    </div>

    <script>
        const students = [
            { name: "maze lagao", branch: "CSE", cgpa: 7.5 },
            { name: "Jane Smith", branch: "AI", cgpa: 8.4 },
            { name: "Alice Johnson", branch: "IT", cgpa: 8.2 },
            { name: "Bob Brown", branch: "CSE", cgpa: 8.0 },
            { name: "Charlie Davis", branch: "AI", cgpa: 7.8 },
            { name: "Eve Wilson", branch: "IOT", cgpa: 9.0 },
            { name: "Frank Miller", branch: "AI", cgpa: 8.6 },
            { name: "Grace Lee", branch: "CSE", cgpa: 7.9 },
            { name: "Hannah Taylor", branch: "AI", cgpa: 8.1 },
            { name: "Ian Anderson", branch: "DS", cgpa: 8.3 }
        ];

        let html = "";

        students.forEach(user => {
            html +=
                `<div class="col-md-4 card-item">
                <div class="card shadow p-3">   
                    <div class="card-body">
                        <img src="https://i.pravatar.cc/150?img=${(user.cgpa)*10}" class="rounded-circle mb-3" alt="Student Image">
                        <h4>${user.name}</h4>
                        <button class="btn btn-primary btn-sm mt-2">
                            Show Details
                        </button>
                        <div class="details mt-3" style="display: none;">
                            <p><strong>Branch:</strong> ${user.branch}</p>
                            <p><strong>CGPA:</strong> ${user.cgpa}</p>
                        </div>
                    </div>
                </div> 
            </div>`
        });
        document.getElementById("container").innerHTML = html;

        $(document).on("click", ".btn", function () {
            $(this).next(".details").slideToggle();
        });

        $("#search").keyup(function () {
            let val = $(this).val().toLowerCase();
            $(".card-item").each(function () {
                let name = $(this).find("h4").text().toLowerCase();
                if (name.includes(val)) {
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });
        });

        document.getElementById("json").innerHTML = JSON.stringify(students, replace, 4);

        function replace(key,value){
            if(key == "cgpa")
                return undefined;
            return value;
        }

    </script>
</body>

</html>
